name: Validate Plugin PR

on:
  pull_request:
    paths:
      - 'plugins/**'
      - 'plugins-index.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check PR modifies only plugins-index.json
        run: |
          # Get list of changed files in this PR
          FILES=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files --jq '.[].filename')
          
          # Check if any file other than plugins-index.json is modified
          NON_INDEX_FILES=$(echo "$FILES" | grep -v '^plugins-index.json$' || true)
          
          if [ -n "$NON_INDEX_FILES" ]; then
            echo "❌ This PR contains changes to files other than plugins-index.json:"
            echo "$NON_INDEX_FILES"
            echo ""
            echo "⚠️  Only pure index updates are eligible for auto-merge."
            echo "   Code changes in plugins/ require manual review."
            exit 1
          fi
          
          echo "✅ PR only modifies plugins-index.json, proceeding with validation."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate plugins-index.json format
        run: python .github/scripts/validate_index.py

      - name: Validate referenced release zip assets
        run: python .github/scripts/validate_plugin_release_assets.py

  auto-merge:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Auto-merge PR
        run: gh pr merge "${{ github.event.pull_request.number }}" --squash --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
