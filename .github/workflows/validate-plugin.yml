name: Validate Plugin PR

on:
  pull_request:
    paths:
      - 'plugins/**'
      - 'plugins-index.json'

jobs:
  classify:
    runs-on: ubuntu-latest
    outputs:
      index_changed: ${{ steps.files.outputs.index_changed }}
      index_only: ${{ steps.files.outputs.index_only }}
      source_changed: ${{ steps.files.outputs.source_changed }}
    steps:
      - name: Classify changed files
        id: files
        run: |
          FILES=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files --jq '.[].filename')
          NON_INDEX_FILES=$(echo "$FILES" | grep -v '^plugins-index.json$' || true)
          INDEX_FILES=$(echo "$FILES" | grep '^plugins-index.json$' || true)

          if [ -n "$INDEX_FILES" ]; then
            echo "index_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "index_changed=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$NON_INDEX_FILES" ]; then
            echo "index_only=false" >> "$GITHUB_OUTPUT"
            echo "source_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "index_only=true" >> "$GITHUB_OUTPUT"
            echo "source_changed=false" >> "$GITHUB_OUTPUT"
          fi

          echo "Changed files:"
          echo "$FILES"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate-source:
    needs: classify
    if: needs.classify.outputs.source_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install validation dependencies
        run: python -m pip install --upgrade pip pytest pandas openpyxl xlrd scipy numpy

      - name: Validate plugin package structure
        run: python .github/scripts/validate_plugins.py

      - name: Scan plugin Python files for dangerous patterns
        run: python .github/scripts/scan_dangerous.py

      - name: Run plugin tests
        run: |
          if [ -d tests ]; then
            pytest -q
          else
            echo "No tests directory present."
          fi

  validate-index:
    needs: classify
    if: needs.classify.outputs.index_changed == 'true' && needs.classify.outputs.source_changed == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate plugins-index.json format
        run: python .github/scripts/validate_index.py

      - name: Validate referenced release zip assets
        run: python .github/scripts/validate_plugin_release_assets.py

  auto-merge:
    needs:
      - classify
      - validate-index
    if: needs.classify.outputs.index_only == 'true' && needs.validate-index.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Auto-merge PR
        run: gh pr merge "${{ github.event.pull_request.number }}" --squash --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
